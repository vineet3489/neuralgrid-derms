databases:
  - name: neuralgrid-db
    databaseName: neuralgrid
    user: neuralgrid
    plan: free

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: neuralgrid-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neuralgrid-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://neuralgrid.vercel.app
      - key: STATIC_DIR
        value: ""
      - key: PYTHONUNBUFFERED
        value: "1"

  # ── Frontend (Vite → static site) ─────────────────────────────────────────
  - type: web
    name: neuralgrid-frontend
    plan: free
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://neuralgrid-backend.onrender.com
